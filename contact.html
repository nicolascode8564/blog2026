<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>
    <link rel="stylesheet" href="contant_style.css" />
  </head>
  <body>
    <header>
      <h2 class="top_heading"><a href="index.html">Welcome To My blog</a></h2>

      <ol>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="resources.html">Resources</a></li>
      </ol>
    </header>
    <main class="contact_container">
      <div class="contact_form">
        <!--form description-->
        <div class="form_description">
          <h1>Meet Me</h1>
          <p class="red-colortext">
            Have a question or feedback? contact me here! Put here name down
            below to ask me anything
          </p>
        </div>
        <!--form data below-->
        <form class="user-form">
          <div class="namewrapper">
            <div class="firstname">
              <label for="name">First name</label>
              <input id="name" required type="text" placeholder=" " />
            </div>
            <div class="firstname">
              <label for="lastname">First name</label>
              <input id="lastname" required type="text" placeholder=" " />
            </div>
          </div>
          <div class="addresswrapper">
            <div class="firstname">
              <label for="city">City</label>
              <input id="city" required type="text" placeholder=" " />
            </div>
            <div class="firstname">
              <label for="Province">Province</label>
              <input id="Province" required type="text" placeholder=" " />
            </div>
          </div>
        </form>
        <button>Submit</button>
      </div>
    </main>
  </body>
</html>
